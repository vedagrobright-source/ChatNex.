<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatNex Calls</title>

    <link rel="stylesheet" href="calls.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="app-container">

    <div class="phone-frame">

        <header>

            <div>
                <h2>Calls</h2>
                <p>Recent voice and video calls</p>
            </div>

            <button id="logoutBtn">

                <i class="fas fa-sign-out-alt"></i>

            </button>

        </header>


        <main class="call-list">

            <div class="call-card">

                <div class="avatar">

                    R

                </div>

                <div class="call-info">

                    <h4>Rahul Sharma</h4>

                    <p>

                        <i class="fas fa-arrow-down"></i>

                        Yesterday, 8:20 PM

                    </p>

                </div>

                <button class="call-btn">

                    <i class="fas fa-phone"></i>

                </button>

            </div>


            <div class="call-card">

                <div class="avatar">

                    P

                </div>

                <div class="call-info">

                    <h4>Priya Singh</h4>

                    <p>

                        <i class="fas fa-video"></i>

                        Today, 10:30 AM

                    </p>

                </div>

                <button class="call-btn">

                    <i class="fas fa-video"></i>

                </button>

            </div>


            <div class="call-card">

                <div class="avatar">

                    A

                </div>

                <div class="call-info">

                    <h4>Alex Johnson</h4>

                    <p>

                        <i class="fas fa-arrow-up"></i>

                        Missed Call

                    </p>

                </div>

                <button class="call-btn">

                    <i class="fas fa-phone"></i>

                </button>

            </div>

        </main>


        <button class="fab">

            <i class="fas fa-phone"></i>

        </button>


        <nav>

            <div class="nav-item"
                data-page="chat.html">

                <i class="fas fa-comment"></i>

                <span>Chats</span>

            </div>

            <div class="nav-item active">

                <i class="fas fa-phone"></i>

                <span>Calls</span>

            </div>

            <div class="nav-item"
                data-page="explore.html">

                <i class="fas fa-compass"></i>

                <span>Explore</span>

            </div>

            <div class="nav-item"
                data-page="profile.html">

                <i class="fas fa-user"></i>

                <span>You</span>

            </div>

        </nav>

    </div>

</div>

<script src="calls.js"></script>

</body>
</html>
