<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ChatNex</title>

    <link rel="stylesheet" href="chat.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="app-container">

    <div class="phone-frame">

        <!-- Header -->
        <header>

            <div class="header-top">

                <div class="user-greeting">

                    <img id="userPhoto" src="" alt="User">

                    <div>

                        <h3 id="greetingText">Good Morning!</h3>

                        <p id="userName">Loading...</p>

                    </div>

                </div>

                <div class="header-icons">

                    <i class="fas fa-search"></i>

                    <button id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>

                </div>

            </div>

            <!-- Tabs -->
            <div class="tabs">

                <button class="tab-btn active" data-page="chat.html">
                    Chats
                </button>

                <button class="tab-btn" data-page="groups.html">
                    Groups
                </button>

                <button class="tab-btn" data-page="contacts.html">
                    Contacts
                </button>

            </div>

        </header>

        <!-- Stories (STATIC OK) -->
        <section class="stories">

            <div class="story">
                <div class="story-avatar add">+</div>
                <span>My Note</span>
            </div>

            <div class="story">
                <div class="story-avatar"></div>
                <span>Alice</span>
            </div>

            <div class="story">
                <div class="story-avatar"></div>
                <span>Mike</span>
            </div>

            <div class="story">
                <div class="story-avatar"></div>
                <span>Sara</span>
            </div>

        </section>

        <!-- CHAT LIST (🔥 NOW DYNAMIC) -->
        <main id="chatList" class="chat-list">

            <!-- Firebase chats will load here -->

        </main>

        <!-- Floating Button -->
        <button class="fab">
            <i class="fas fa-plus"></i>
        </button>

        <!-- Bottom Navigation -->
        <nav>

            <div class="nav-item active" data-page="chat.html">
                <i class="fas fa-comment"></i>
                <span>Chats</span>
            </div>

            <div class="nav-item" data-page="calls.html">
                <i class="fas fa-phone"></i>
                <span>Calls</span>
            </div>

            <div class="nav-item" data-page="explore.html">
                <i class="fas fa-compass"></i>
                <span>Explore</span>
            </div>

            <div class="nav-item" data-page="profile.html">
                <i class="fas fa-user"></i>
                <span>You</span>
            </div>

        </nav>

    </div>

</div>

<script type="module" src="chat.js"></script>

</body>

</html>
