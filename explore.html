<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatNex Explore</title>

    <link rel="stylesheet" href="explore.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="app-container">

    <div class="phone-frame">

        <!-- Header -->

        <header>

            <div>

                <h2>Explore</h2>

                <p>Discover more on ChatNex</p>

            </div>

            <button id="logoutBtn">

                <i class="fas fa-sign-out-alt"></i>

            </button>

        </header>


        <!-- Search -->

        <div class="search-box">

            <input
                type="text"
                placeholder="Search communities, channels...">

        </div>


        <!-- AI Assistant -->

        <section class="section">

            <h3>AI Assistant</h3>

            <div class="feature-card ai">

                <div>

                    <h4>ChatNex AI</h4>

                    <p>Your smart assistant</p>

                </div>

                <button>

                    Try

                </button>

            </div>

        </section>


        <!-- Communities -->

        <section class="section">

            <h3>Trending Communities</h3>

            <div class="community-list">

                <div class="community-card">

                    <i class="fas fa-code"></i>

                    <span>Developers</span>

                </div>

                <div class="community-card">

                    <i class="fas fa-gamepad"></i>

                    <span>Gamers</span>

                </div>

                <div class="community-card">

                    <i class="fas fa-film"></i>

                    <span>Movies</span>

                </div>

            </div>

        </section>


        <!-- Channels -->

        <section class="section">

            <h3>Popular Channels</h3>

            <div class="channel-card">

                <div>

                    <h4>Tech Updates</h4>

                    <p>125K Subscribers</p>

                </div>

                <button>

                    Join

                </button>

            </div>

            <div class="channel-card">

                <div>

                    <h4>Daily Motivation</h4>

                    <p>89K Subscribers</p>

                </div>

                <button>

                    Join

                </button>

            </div>

        </section>


        <!-- Mini Apps -->

        <section class="section">

            <h3>Mini Apps</h3>

            <div class="community-list">

                <div class="community-card">

                    <i class="fas fa-calculator"></i>

                    <span>Calculator</span>

                </div>

                <div class="community-card">

                    <i class="fas fa-cloud-sun"></i>

                    <span>Weather</span>

                </div>

                <div class="community-card">

                    <i class="fas fa-sticky-note"></i>

                    <span>Notes</span>

                </div>

            </div>

        </section>


        <!-- Bottom Navigation -->

        <nav>

            <div class="nav-item"
                data-page="chat.html">

                <i class="fas fa-comment"></i>

                <span>Chats</span>

            </div>

            <div class="nav-item"
                data-page="calls.html">

                <i class="fas fa-phone"></i>

                <span>Calls</span>

            </div>

            <div class="nav-item active">

                <i class="fas fa-compass"></i>

                <span>Explore</span>

            </div>

            <div class="nav-item"
                data-page="profile.html">

                <i class="fas fa-user"></i>

                <span>You</span>

            </div>

        </nav>

    </div>

</div>

<script src="explore.js"></script>

</body>
</html>
