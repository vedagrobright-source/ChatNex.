<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>ChatNex Groups</title>

    <link rel="stylesheet"
        href="groups.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <div class="app-container">

        <div class="phone-frame">

            <!-- Header -->

            <header>

                <div class="header-top">

                    <div class="title-section">

                        <h2>Groups</h2>

                        <p>Your communities</p>

                    </div>

                    <button id="logoutBtn">

                        <i class="fas fa-sign-out-alt"></i>

                    </button>

                </div>

            </header>

            <!-- Search -->

            <div class="search-box">

                <input type="text"
                    placeholder="Search groups...">

            </div>

            <!-- Group List -->

            <main class="group-list">

                <div class="group-card">

                    <div class="group-avatar">

                        👨‍👩‍👧‍👦

                    </div>

                    <div class="group-info">

                        <h4>Family</h4>

                        <p>Mom: Dinner at 8 PM</p>

                    </div>

                    <div class="group-meta">

                        <span>5 Members</span>

                        <div class="badge">

                            3

                        </div>

                    </div>

                </div>


                <div class="group-card">

                    <div class="group-avatar">

                        💼

                    </div>

                    <div class="group-info">

                        <h4>Office Team</h4>

                        <p>Meeting starts soon</p>

                    </div>

                    <div class="group-meta">

                        <span>18 Members</span>

                    </div>

                </div>


                <div class="group-card">

                    <div class="group-avatar">

                        🎓

                    </div>

                    <div class="group-info">

                        <h4>College Friends</h4>

                        <p>Rahul: Party tonight?</p>

                    </div>

                    <div class="group-meta">

                        <span>12 Members</span>

                        <div class="badge">

                            7

                        </div>

                    </div>

                </div>

            </main>

            <!-- Floating Button -->

            <button class="fab">

                <i class="fas fa-users"></i>

            </button>

            <!-- Bottom Navigation -->

            <nav>

                <div class="nav-item"
                    data-page="chat.html">

                    <i class="fas fa-comment"></i>

                    <span>Chats</span>

                </div>

                <div class="nav-item active">

                    <i class="fas fa-users"></i>

                    <span>Groups</span>

                </div>

                <div class="nav-item"
                    data-page="calls.html">

                    <i class="fas fa-phone"></i>

                    <span>Calls</span>

                </div>

                <div class="nav-item"
                    data-page="profile.html">

                    <i class="fas fa-user"></i>

                    <span>You</span>

                </div>

            </nav>

        </div>

    </div>

    <script src="groups.js"></script>

</body>

</html>
